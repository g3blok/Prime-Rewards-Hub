<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Rewards Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            border-radius: 15px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: black;
            font-size: 24px;
        }
        h1 { font-weight: 700; font-size: 28px; margin-bottom: 10px; letter-spacing: -1px; }
        p { color: #888; font-weight: 300; font-size: 15px; margin-bottom: 35px; line-height: 1.5; }
        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: white;
            outline: none;
            transition: 0.3s;
            font-size: 16px;
        }
        input:focus {
            border-color: #ffd700;
            background: rgba(255, 255, 255, 0.08);
        }
        button {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 20px rgba(255,255,255,0.15);
            background: #ffd700;
        }
        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: #444;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-icon">P</div>
    <h1>Prime Rewards Hub</h1>
    <p>Join our exclusive community. Enter your details for a chance to win this season's premium rewards.</p>
    
    <form action="https://formspree.io/f/mqaebrko" method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <button type="submit">Join Giveaway</button>
    </form>

    <div class="footer">
        Verified Secured Entry • 2026
    </div>
</div>

</body>
</html>
